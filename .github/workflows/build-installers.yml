name: Build & Release REACHER

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      reacher_ref:
        description: 'reacher repo branch/tag to install (default: main)'
        required: false
        default: 'main'

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # -------------------------------------------------------------------
  # Windows — Inno Setup installer (.exe)
  # -------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install Arduino AVR core
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Locate avrdude
        id: avrdude
        shell: bash
        run: |
          AVRDUDE=$(find "$LOCALAPPDATA/Arduino15/packages/arduino/tools/avrdude" -name "avrdude.exe" -type f | head -1)
          echo "path=$AVRDUDE" >> "$GITHUB_OUTPUT"
          echo "Found avrdude at: $AVRDUDE"

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Install reacher from source
        shell: bash
        run: |
          REF="${{ inputs.reacher_ref || 'main' }}"
          git clone --depth 1 --branch "$REF" https://github.com/otis-lab-musc/reacher.git _reacher
          python -m pip install ./_reacher
          python -c "import reacher; print('reacher OK')"

      - name: Install Python build tools
        run: python -m pip install pyinstaller

      - name: Build application
        run: python build.py --avrdude "${{ steps.avrdude.outputs.path }}"

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Windows installer
        env:
          VERSION_NUM: ${{ steps.version.outputs.version }}
        run: iscc installer\reacher.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/REACHER-${{ steps.version.outputs.version }}-windows-x64.exe

  # -------------------------------------------------------------------
  # macOS — DMG disk image (.dmg)
  # -------------------------------------------------------------------
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install Arduino AVR core
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Locate avrdude
        id: avrdude
        run: |
          AVRDUDE=$(find ~/Library/Arduino15/packages/arduino/tools/avrdude -name "avrdude" -not -path "*/etc/*" -type f | head -1)
          echo "path=$AVRDUDE" >> "$GITHUB_OUTPUT"
          echo "Found avrdude at: $AVRDUDE"

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Install reacher from source
        run: |
          REF="${{ inputs.reacher_ref || 'main' }}"
          git clone --depth 1 --branch "$REF" https://github.com/otis-lab-musc/reacher.git _reacher
          python -m pip install ./_reacher
          python -c "import reacher; print('reacher OK')"

      - name: Install Python build tools
        run: python -m pip install pyinstaller

      - name: Build application
        run: python build.py --avrdude "${{ steps.avrdude.outputs.path }}"

      - name: Create DMG
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          hdiutil create \
            -volname "REACHER $VERSION" \
            -srcfolder dist/REACHER.app \
            -ov -format UDZO \
            "dist/REACHER-${VERSION}-macos-arm64.dmg"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/REACHER-${{ steps.version.outputs.version }}-macos-arm64.dmg

  # -------------------------------------------------------------------
  # Linux — DEB package (.deb)
  # -------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install Arduino AVR core
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Locate avrdude
        id: avrdude
        run: |
          AVRDUDE=$(find ~/.arduino15/packages/arduino/tools/avrdude -name "avrdude" -not -path "*/etc/*" -type f | head -1)
          echo "path=$AVRDUDE" >> "$GITHUB_OUTPUT"
          echo "Found avrdude at: $AVRDUDE"

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Install reacher from source
        run: |
          REF="${{ inputs.reacher_ref || 'main' }}"
          git clone --depth 1 --branch "$REF" https://github.com/otis-lab-musc/reacher.git _reacher
          python -m pip install ./_reacher
          python -c "import reacher; print('reacher OK')"

      - name: Install Python build tools
        run: python -m pip install pyinstaller

      - name: Build application
        run: python build.py --avrdude "${{ steps.avrdude.outputs.path }}"

      - name: Build DEB package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          PKG="reacher_${VERSION}_amd64"
          mkdir -p "${PKG}/DEBIAN"
          mkdir -p "${PKG}/opt/reacher"
          mkdir -p "${PKG}/usr/local/bin"

          cat > "${PKG}/DEBIAN/control" <<EOF
          Package: reacher
          Version: ${VERSION}
          Section: science
          Priority: optional
          Architecture: amd64
          Maintainer: Otis Lab <otislab@musc.edu>
          Description: REACHER — Neuroscience experiment control system
           Head-fixed rodent operant conditioning control software.
          EOF

          cp -r dist/REACHER/* "${PKG}/opt/reacher/"
          chmod +x "${PKG}/opt/reacher/REACHER"
          ln -s /opt/reacher/REACHER "${PKG}/usr/local/bin/reacher"

          dpkg-deb --build "$PKG"

      - name: Build tarball
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: tar -czf "REACHER-${VERSION}-linux-x64.tar.gz" -C dist REACHER

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            reacher_${{ steps.version.outputs.version }}_amd64.deb
            REACHER-${{ steps.version.outputs.version }}-linux-x64.tar.gz

  # -------------------------------------------------------------------
  # Release — publish artifacts to GitHub Releases
  # -------------------------------------------------------------------
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          body: |
            ## Installation Notes

            **macOS:** If Gatekeeper blocks the app, right-click the .app → Open, or run:
            ```
            xattr -d com.apple.quarantine REACHER.app
            ```

            **Windows:** If SmartScreen warns, click "More info" → "Run anyway".

            **Linux (tarball):** Extract and run directly:
            ```
            tar -xzf REACHER-*-linux-x64.tar.gz
            ./REACHER/REACHER
            ```
          files: |
            artifacts/*.exe
            artifacts/*.dmg
            artifacts/*.deb
            artifacts/*.tar.gz
