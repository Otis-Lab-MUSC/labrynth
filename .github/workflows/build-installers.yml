name: Build & Release REACHER

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      reacher_ref:
        description: 'reacher repo branch/tag to install (default: main)'
        required: false
        default: 'main'

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # -------------------------------------------------------------------
  # Gate — verify source files match the tag version
  # -------------------------------------------------------------------
  version-check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify version consistency
        if: github.ref_type == 'tag'
        run: python scripts/bump-version.py --check "${{ steps.version.outputs.version }}"

  # -------------------------------------------------------------------
  # Windows — Inno Setup installer (.exe)
  # -------------------------------------------------------------------
  build-windows:
    needs: [version-check]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install Arduino AVR core
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Locate avrdude
        id: avrdude
        shell: bash
        run: |
          AVRDUDE=$(find "$LOCALAPPDATA/Arduino15/packages/arduino/tools/avrdude" -name "avrdude.exe" -type f | head -1)
          echo "path=$AVRDUDE" >> "$GITHUB_OUTPUT"
          echo "Found avrdude at: $AVRDUDE"

      - name: Install reacher from source
        shell: bash
        run: |
          REF="${{ inputs.reacher_ref || 'main' }}"
          git clone --depth 1 --branch "$REF" https://github.com/otis-lab-musc/reacher.git _reacher
          python -m pip install ./_reacher
          python -c "import reacher; print('reacher OK')"

      - name: Install Python build tools
        run: python -m pip install pyinstaller

      - name: Build application
        run: python build.py --avrdude "${{ steps.avrdude.outputs.path }}"

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Windows installer
        env:
          VERSION_NUM: ${{ needs.version-check.outputs.version }}
        run: iscc installer\reacher.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/REACHER-${{ needs.version-check.outputs.version }}-windows-x64.exe

  # -------------------------------------------------------------------
  # macOS — DMG disk image (.dmg) — Apple Silicon (arm64)
  # -------------------------------------------------------------------
  build-macos-arm64:
    needs: [version-check]
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install Arduino AVR core
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Locate avrdude
        id: avrdude
        run: |
          AVRDUDE=$(find ~/Library/Arduino15/packages/arduino/tools/avrdude -name "avrdude" -not -path "*/etc/*" -type f | head -1)
          echo "path=$AVRDUDE" >> "$GITHUB_OUTPUT"
          echo "Found avrdude at: $AVRDUDE"

      - name: Install reacher from source
        run: |
          REF="${{ inputs.reacher_ref || 'main' }}"
          git clone --depth 1 --branch "$REF" https://github.com/otis-lab-musc/reacher.git _reacher
          python -m pip install ./_reacher
          python -c "import reacher; print('reacher OK')"

      - name: Install Python build tools
        run: python -m pip install pyinstaller

      - name: Build application
        run: python build.py --avrdude "${{ steps.avrdude.outputs.path }}"

      - name: Create DMG
        env:
          VERSION: ${{ needs.version-check.outputs.version }}
        run: |
          hdiutil create \
            -volname "REACHER $VERSION" \
            -srcfolder dist/REACHER.app \
            -ov -format UDZO \
            "dist/REACHER-${VERSION}-macos-arm64.dmg"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-dmg
          path: dist/REACHER-${{ needs.version-check.outputs.version }}-macos-arm64.dmg

  # -------------------------------------------------------------------
  # macOS — DMG disk image (.dmg) — Intel (x64)
  # -------------------------------------------------------------------
  build-macos-x64:
    needs: [version-check]
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install Arduino AVR core
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Locate avrdude
        id: avrdude
        run: |
          AVRDUDE=$(find ~/Library/Arduino15/packages/arduino/tools/avrdude -name "avrdude" -not -path "*/etc/*" -type f | head -1)
          echo "path=$AVRDUDE" >> "$GITHUB_OUTPUT"
          echo "Found avrdude at: $AVRDUDE"

      - name: Install reacher from source
        run: |
          REF="${{ inputs.reacher_ref || 'main' }}"
          git clone --depth 1 --branch "$REF" https://github.com/otis-lab-musc/reacher.git _reacher
          python -m pip install ./_reacher
          python -c "import reacher; print('reacher OK')"

      - name: Install Python build tools
        run: python -m pip install pyinstaller

      - name: Build application
        run: python build.py --avrdude "${{ steps.avrdude.outputs.path }}"

      - name: Create DMG
        env:
          VERSION: ${{ needs.version-check.outputs.version }}
        run: |
          hdiutil create \
            -volname "REACHER $VERSION" \
            -srcfolder dist/REACHER.app \
            -ov -format UDZO \
            "dist/REACHER-${VERSION}-macos-x64.dmg"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64-dmg
          path: dist/REACHER-${{ needs.version-check.outputs.version }}-macos-x64.dmg

  # -------------------------------------------------------------------
  # Linux — DEB package (.deb), tarball (.tar.gz), AppImage
  # -------------------------------------------------------------------
  build-linux:
    needs: [version-check]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install Arduino AVR core
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Locate avrdude
        id: avrdude
        run: |
          AVRDUDE=$(find ~/.arduino15/packages/arduino/tools/avrdude -name "avrdude" -not -path "*/etc/*" -type f | head -1)
          echo "path=$AVRDUDE" >> "$GITHUB_OUTPUT"
          echo "Found avrdude at: $AVRDUDE"

      - name: Install reacher from source
        run: |
          REF="${{ inputs.reacher_ref || 'main' }}"
          git clone --depth 1 --branch "$REF" https://github.com/otis-lab-musc/reacher.git _reacher
          python -m pip install ./_reacher
          python -c "import reacher; print('reacher OK')"

      - name: Install Python build tools
        run: python -m pip install pyinstaller

      - name: Build application
        run: python build.py --avrdude "${{ steps.avrdude.outputs.path }}"

      - name: Build DEB package
        env:
          VERSION: ${{ needs.version-check.outputs.version }}
        run: |
          PKG="reacher_${VERSION}_amd64"
          mkdir -p "${PKG}/DEBIAN"
          mkdir -p "${PKG}/opt/reacher"
          mkdir -p "${PKG}/usr/local/bin"

          cat > "${PKG}/DEBIAN/control" <<EOF
          Package: reacher
          Version: ${VERSION}
          Section: science
          Priority: optional
          Architecture: amd64
          Maintainer: Otis Lab <otislab@musc.edu>
          Description: REACHER — Neuroscience experiment control system
           Head-fixed rodent operant conditioning control software.
          EOF

          cp -r dist/REACHER/* "${PKG}/opt/reacher/"
          chmod +x "${PKG}/opt/reacher/REACHER"
          ln -s /opt/reacher/REACHER "${PKG}/usr/local/bin/reacher"

          dpkg-deb --build "$PKG"

      - name: Build tarball
        env:
          VERSION: ${{ needs.version-check.outputs.version }}
        run: tar -czf "REACHER-${VERSION}-linux-x64.tar.gz" -C dist REACHER

      - name: Build AppImage
        env:
          VERSION: ${{ needs.version-check.outputs.version }}
        run: |
          # Create AppDir structure
          APPDIR="REACHER.AppDir"
          mkdir -p "${APPDIR}/usr/bin"
          cp -r dist/REACHER/* "${APPDIR}/usr/bin/"
          chmod +x "${APPDIR}/usr/bin/REACHER"

          # AppRun entry point
          cat > "${APPDIR}/AppRun" <<'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/REACHER" "$@"
          APPRUN
          chmod +x "${APPDIR}/AppRun"

          # Desktop entry and icon
          cp installer/reacher.desktop "${APPDIR}/reacher.desktop"
          if [ -f installer/icons/reacher.png ]; then
            cp installer/icons/reacher.png "${APPDIR}/reacher.png"
          else
            # Generate a placeholder 256x256 icon if none exists
            python3 -c "
          import struct, zlib
          W=H=256
          raw = b''
          for y in range(H):
              raw += b'\x00'
              for x in range(W):
                  cx, cy = abs(x-W//2), abs(y-H//2)
                  if cx < 80 and cy < 80:
                      raw += b'\x00\xff\x41\xff'
                  else:
                      raw += b'\x00\x00\x00\x00'
          def chunk(t,d): return struct.pack('>I',len(d))+t+d+struct.pack('>I',zlib.crc32(t+d)&0xffffffff)
          hdr = struct.pack('>IIBBBBB',W,H,8,6,0,0,0)
          with open('${APPDIR}/reacher.png','wb') as f:
              f.write(b'\x89PNG\r\n\x1a\n')
              f.write(chunk(b'IHDR',hdr))
              f.write(chunk(b'IDAT',zlib.compress(raw)))
              f.write(chunk(b'IEND',b''))
          "
          fi

          # Download appimagetool
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool

          # Build the AppImage
          ARCH=x86_64 ./appimagetool --no-appstream "${APPDIR}" "REACHER-${VERSION}-linux-x64.AppImage"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            reacher_${{ needs.version-check.outputs.version }}_amd64.deb
            REACHER-${{ needs.version-check.outputs.version }}-linux-x64.tar.gz
            REACHER-${{ needs.version-check.outputs.version }}-linux-x64.AppImage

  # -------------------------------------------------------------------
  # Release — publish artifacts to GitHub Releases
  # -------------------------------------------------------------------
  release:
    needs: [build-windows, build-macos-arm64, build-macos-x64, build-linux, version-check]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          body: |
            ## Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | Windows (x64) | `REACHER-*-windows-x64.exe` | Installer |
            | macOS (Apple Silicon) | `REACHER-*-macos-arm64.dmg` | M1/M2/M3/M4 |
            | macOS (Intel) | `REACHER-*-macos-x64.dmg` | Pre-2020 Macs |
            | Linux (Debian/Ubuntu) | `reacher_*_amd64.deb` | `sudo dpkg -i *.deb` |
            | Linux (portable) | `REACHER-*-linux-x64.AppImage` | Any distro |
            | Linux (tarball) | `REACHER-*-linux-x64.tar.gz` | Extract and run |

            <details>
            <summary>Platform-specific notes</summary>

            **macOS — Gatekeeper warning:** Until code signing is enabled, macOS will block
            the app on first launch. Right-click the .app → Open, or run:
            ```
            xattr -d com.apple.quarantine /Applications/REACHER.app
            ```

            **Windows — SmartScreen warning:** Until code signing is enabled, Windows may
            show a SmartScreen warning. Click "More info" → "Run anyway".

            **Linux AppImage:** Make executable and run:
            ```
            chmod +x REACHER-*-linux-x64.AppImage
            ./REACHER-*-linux-x64.AppImage
            ```
            </details>
          files: |
            artifacts/*.exe
            artifacts/*.dmg
            artifacts/*.deb
            artifacts/*.tar.gz
            artifacts/*.AppImage
