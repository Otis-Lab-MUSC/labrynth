name: Build & Release Labrynth (Prerelease)

on:
  push:
    tags: ['v*.*.*-alpha.*', 'v*.*.*-beta.*', 'v*.*.*-rc.*']
  workflow_dispatch:
    inputs:
      reacher_ref:
        description: 'reacher branch/tag to bundle (e.g. v3.0.0-alpha.2, main, or a branch name)'
        required: false
        default: 'main'

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # -------------------------------------------------------------------
  # Gate — verify source files match the tag version + resolve reacher ref
  # -------------------------------------------------------------------
  version-check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      reacher_ref: ${{ steps.reacher_ref.outputs.ref }}
      reacher_ref_source: ${{ steps.reacher_ref.outputs.source }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify tag is a prerelease
        if: github.ref_type == 'tag'
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ -(alpha|beta|rc)\. ]]; then
            echo "ERROR: build-prerelease.yml triggered by a non-prerelease tag: $GITHUB_REF_NAME" >&2
            exit 1
          fi

      - name: Verify version consistency
        if: github.ref_type == 'tag'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: python scripts/bump-version.py --check "$VERSION"

      - name: Resolve reacher ref
        id: reacher_ref
        env:
          REACHER_REF_INPUT: ${{ inputs.reacher_ref || 'main' }}
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            # Tag-triggered: derive deterministically from the committed reacher pin
            REF=$(python scripts/bump-version.py --print-reacher-ref)
            if [ -z "$REF" ]; then
              echo "ERROR: Could not determine reacher ref from pyproject.toml pin" >&2
              exit 1
            fi
            echo "ref=$REF" >> "$GITHUB_OUTPUT"
            echo "source=pyproject_pin" >> "$GITHUB_OUTPUT"
          else
            # workflow_dispatch: use the provided input (defaults to 'main')
            echo "ref=$REACHER_REF_INPUT" >> "$GITHUB_OUTPUT"
            echo "source=workflow_dispatch" >> "$GITHUB_OUTPUT"
          fi

  # -------------------------------------------------------------------
  # Windows — Inno Setup installer (.exe)
  # -------------------------------------------------------------------
  build-windows:
    needs: [version-check]
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Download avrdude
        id: avrdude
        shell: pwsh
        run: |
          # Download avrdude directly from GitHub releases instead of
          # Chocolatey.  Chocolatey installs a shim that breaks when
          # relocated into a PyInstaller bundle.  The MSVC build is
          # statically linked — no DLLs needed.
          $version = "8.1"
          $zip = "avrdude-v${version}-windows-x64.zip"
          $url = "https://github.com/avrdudes/avrdude/releases/download/v${version}/${zip}"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath avrdude-dist -Force
          $exe = Get-ChildItem -Path avrdude-dist -Filter "avrdude.exe" -Recurse -File |
                 Select-Object -First 1
          if (-not $exe) {
            Write-Host "ERROR: avrdude.exe not found in archive"
            Get-ChildItem avrdude-dist -Recurse | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }
          Write-Host "Found avrdude at: $($exe.FullName)  ($($exe.Length) bytes)"
          "path=$($exe.FullName)" >> $env:GITHUB_OUTPUT

      - name: Install reacher from source
        env:
          REACHER_REF: ${{ needs.version-check.outputs.reacher_ref }}
        shell: bash
        run: |
          git clone --depth 1 --branch "$REACHER_REF" https://github.com/otis-lab-musc/reacher.git _reacher
          python -m pip install ./_reacher
          python -c "import reacher; print('reacher OK:', reacher.__version__)"

      - name: Install Python build tools
        run: python -m pip install pyinstaller prompt_toolkit httpx websockets

      - name: Build application
        run: python build.py --cli --avrdude "${{ steps.avrdude.outputs.path }}"

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Windows installer
        env:
          VERSION_NUM: ${{ needs.version-check.outputs.version }}
        run: iscc installer\reacher.iss

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: dist/labrynth-${{ needs.version-check.outputs.version }}-windows-x64.exe

      - name: Package CLI bundle
        shell: bash
        env:
          VERSION: ${{ needs.version-check.outputs.version }}
        run: tar -czf "dist/labrynth-cli-${VERSION}-windows-x64.tar.gz" -C dist LabrynthCLI

      - name: Upload CLI bundle
        uses: actions/upload-artifact@v7
        with:
          name: windows-cli
          path: dist/labrynth-cli-${{ needs.version-check.outputs.version }}-windows-x64.tar.gz

  # -------------------------------------------------------------------
  # macOS — DMG disk image (.dmg) — Apple Silicon (arm64)
  # -------------------------------------------------------------------
  build-macos-arm64:
    needs: [version-check]
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install avrdude
        run: brew install avrdude

      - name: Locate avrdude
        id: avrdude
        run: |
          AVRDUDE=$(which avrdude)
          echo "path=$AVRDUDE" >> "$GITHUB_OUTPUT"
          echo "Found avrdude at: $AVRDUDE"

      - name: Install reacher from source
        env:
          REACHER_REF: ${{ needs.version-check.outputs.reacher_ref }}
        run: |
          git clone --depth 1 --branch "$REACHER_REF" https://github.com/otis-lab-musc/reacher.git _reacher
          python -m pip install ./_reacher
          python -c "import reacher; print('reacher OK:', reacher.__version__)"

      - name: Install Python build tools
        run: python -m pip install pyinstaller Pillow prompt_toolkit httpx websockets

      - name: Build application
        run: python build.py --cli --avrdude "${{ steps.avrdude.outputs.path }}"

      - name: Create DMG
        env:
          VERSION: ${{ needs.version-check.outputs.version }}
        run: |
          hdiutil create \
            -volname "Labrynth $VERSION" \
            -srcfolder dist/Labrynth.app \
            -ov -format UDZO \
            "dist/labrynth-${VERSION}-macos-arm64.dmg"

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: macos-arm64-dmg
          path: dist/labrynth-${{ needs.version-check.outputs.version }}-macos-arm64.dmg

      - name: Package CLI bundle
        env:
          VERSION: ${{ needs.version-check.outputs.version }}
        run: tar -czf "dist/labrynth-cli-${VERSION}-macos-arm64.tar.gz" -C dist LabrynthCLI

      - name: Upload CLI bundle
        uses: actions/upload-artifact@v7
        with:
          name: macos-arm64-cli
          path: dist/labrynth-cli-${{ needs.version-check.outputs.version }}-macos-arm64.tar.gz

  # -------------------------------------------------------------------
  # Linux — DEB package (.deb), tarball (.tar.gz), AppImage
  # -------------------------------------------------------------------
  build-linux:
    needs: [version-check]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install avrdude
        run: sudo apt-get update -qq && sudo apt-get install -y -qq avrdude

      - name: Locate avrdude
        id: avrdude
        run: |
          AVRDUDE=$(which avrdude)
          echo "path=$AVRDUDE" >> "$GITHUB_OUTPUT"
          echo "Found avrdude at: $AVRDUDE"

      - name: Install reacher from source
        env:
          REACHER_REF: ${{ needs.version-check.outputs.reacher_ref }}
        run: |
          git clone --depth 1 --branch "$REACHER_REF" https://github.com/otis-lab-musc/reacher.git _reacher
          python -m pip install ./_reacher
          python -c "import reacher; print('reacher OK:', reacher.__version__)"

      - name: Install Python build tools
        run: python -m pip install pyinstaller prompt_toolkit httpx websockets

      - name: Build application
        run: python build.py --cli --avrdude "${{ steps.avrdude.outputs.path }}"

      - name: Build DEB package
        env:
          VERSION: ${{ needs.version-check.outputs.version }}
        run: |
          PKG="labrynth_${VERSION}_amd64"
          mkdir -p "${PKG}/DEBIAN"
          mkdir -p "${PKG}/opt/labrynth"
          mkdir -p "${PKG}/usr/local/bin"

          cat > "${PKG}/DEBIAN/control" <<EOF
          Package: labrynth
          Version: ${VERSION}
          Section: science
          Priority: optional
          Architecture: amd64
          Maintainer: Otis Lab <otislab@musc.edu>
          Description: Labrynth — Neuroscience experiment control system
           Head-fixed rodent operant conditioning control software.
          EOF

          cp -r dist/Labrynth/* "${PKG}/opt/labrynth/"
          chmod +x "${PKG}/opt/labrynth/Labrynth"
          ln -s /opt/labrynth/Labrynth "${PKG}/usr/local/bin/labrynth"

          dpkg-deb --build "$PKG"

      - name: Build tarball
        env:
          VERSION: ${{ needs.version-check.outputs.version }}
        run: tar -czf "labrynth-${VERSION}-linux-x64.tar.gz" -C dist Labrynth

      - name: Build CLI tarball
        env:
          VERSION: ${{ needs.version-check.outputs.version }}
        run: tar -czf "labrynth-cli-${VERSION}-linux-x64.tar.gz" -C dist LabrynthCLI

      - name: Build AppImage
        env:
          VERSION: ${{ needs.version-check.outputs.version }}
        run: |
          # Create AppDir structure
          APPDIR="Labrynth.AppDir"
          mkdir -p "${APPDIR}/usr/bin"
          cp -r dist/Labrynth/* "${APPDIR}/usr/bin/"
          chmod +x "${APPDIR}/usr/bin/Labrynth"

          # AppRun entry point
          cat > "${APPDIR}/AppRun" <<'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/Labrynth" "$@"
          APPRUN
          chmod +x "${APPDIR}/AppRun"

          # Desktop entry and icon
          cp installer/reacher.desktop "${APPDIR}/reacher.desktop"
          if [ -f installer/icons/reacher.png ]; then
            cp installer/icons/reacher.png "${APPDIR}/reacher.png"
          else
            # Generate a placeholder 256x256 icon if none exists
            python3 -c "
          import struct, zlib
          W=H=256
          raw = b''
          for y in range(H):
              raw += b'\x00'
              for x in range(W):
                  cx, cy = abs(x-W//2), abs(y-H//2)
                  if cx < 80 and cy < 80:
                      raw += b'\x00\xff\x41\xff'
                  else:
                      raw += b'\x00\x00\x00\x00'
          def chunk(t,d): return struct.pack('>I',len(d))+t+d+struct.pack('>I',zlib.crc32(t+d)&0xffffffff)
          hdr = struct.pack('>IIBBBBB',W,H,8,6,0,0,0)
          with open('${APPDIR}/reacher.png','wb') as f:
              f.write(b'\x89PNG\r\n\x1a\n')
              f.write(chunk(b'IHDR',hdr))
              f.write(chunk(b'IDAT',zlib.compress(raw)))
              f.write(chunk(b'IEND',b''))
          "
          fi

          # Download appimagetool
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool

          # Build the AppImage
          ARCH=x86_64 ./appimagetool --no-appstream "${APPDIR}" "labrynth-${VERSION}-linux-x64.AppImage"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-installers
          path: |
            labrynth_${{ needs.version-check.outputs.version }}_amd64.deb
            labrynth-${{ needs.version-check.outputs.version }}-linux-x64.tar.gz
            labrynth-cli-${{ needs.version-check.outputs.version }}-linux-x64.tar.gz
            labrynth-${{ needs.version-check.outputs.version }}-linux-x64.AppImage

  # -------------------------------------------------------------------
  # Release — publish artifacts; proceeds even with partial platform coverage
  # -------------------------------------------------------------------
  release:
    needs: [build-windows, build-macos-arm64, build-linux, version-check]
    runs-on: ubuntu-latest
    # Run even if some build jobs failed (continue-on-error makes them report 'success'),
    # but only for tag-triggered runs and only if version-check passed.
    if: always() && github.ref_type == 'tag' && needs.version-check.result == 'success'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          VERSION: ${{ needs.version-check.outputs.version }}
          REACHER_REF: ${{ needs.version-check.outputs.reacher_ref }}
          REACHER_REF_SOURCE: ${{ needs.version-check.outputs.reacher_ref_source }}
        with:
          generate_release_notes: true
          prerelease: true
          body: |
            > **Pre-release build** — for lab beta-testers. May contain known bugs. Do not use in production experiments without explicit sign-off.

            **Labrynth:** `${{ needs.version-check.outputs.version }}` | **reacher bundled:** `${{ needs.version-check.outputs.reacher_ref }}` (resolved from ${{ needs.version-check.outputs.reacher_ref_source }})

            ## Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | Windows (x64) | `labrynth-*-windows-x64.exe` | Installer |
            | macOS (Apple Silicon) | `labrynth-*-macos-arm64.dmg` | M1/M2/M3/M4 |
            | Linux (Debian/Ubuntu) | `labrynth_*_amd64.deb` | `sudo dpkg -i *.deb` |
            | Linux (portable) | `labrynth-*-linux-x64.AppImage` | Any distro |
            | Linux (tarball) | `labrynth-*-linux-x64.tar.gz` | Extract and run |
            | Terminal CLI (all platforms) | `labrynth-cli-*-<os>.tar.gz` | Headless TUI — extract and run `LabrynthCLI` |

            > Not all platforms may be available for this build — check the attached assets.

            ## Reporting issues
            Include: OS version, exact installer filename, and the reacher version shown in the app's About modal.

            <details>
            <summary>Platform-specific notes</summary>

            **macOS — Gatekeeper warning:** Until code signing is enabled, macOS will block
            the app on first launch. Right-click the .app → Open, or run:
            ```
            xattr -d com.apple.quarantine /Applications/Labrynth.app
            ```

            **Windows — SmartScreen warning:** Until code signing is enabled, Windows may
            show a SmartScreen warning. Click "More info" → "Run anyway".

            **Linux AppImage:** Make executable and run:
            ```
            chmod +x labrynth-*-linux-x64.AppImage
            ./labrynth-*-linux-x64.AppImage
            ```
            </details>
          files: |
            artifacts/*.exe
            artifacts/*.dmg
            artifacts/*.deb
            artifacts/*.tar.gz
            artifacts/*.AppImage
