name: Deploy Labrynth Demo

on:
  push:
    branches: [main]
    paths: ['web/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Build demo
        run: npm run build:demo
        working-directory: web
        env:
          # Relative base => path-agnostic build. Works for this Pages site
          # (served at /labrynth/) AND when embedded under any mount path by a
          # downstream consumer (see web/README.md "Embeddable demo artifact").
          VITE_BASE: ./

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - name: Upload embeddable demo artifact (path-agnostic, base=./)
        uses: actions/upload-artifact@v4
        with:
          name: labrynth-demo
          path: web/dist
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
