name: Trigger Site Demo Sync

on:
  push:
    branches: [main]
    paths: ['web/**']

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REACHER_SUITE_SITE_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'otis-lab-musc',
              repo: 'REACHER-Suite',
              workflow_id: 'deploy-site.yml',
              ref: 'main'
            })
